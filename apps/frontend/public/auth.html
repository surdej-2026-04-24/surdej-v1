<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
</head>
<body>
    <script>
        // Check if we are in a popup
        if (window.opener) {
            // We are likely in an authentication popup.
            // MSAL.js in the main window will monitor this window's location.
        } else {
            // If there is no opener, redirect to home
            window.location.href = '/';
        }
    </script>
</body>
</html>
