# OpenTelemetry Collector — Receives telemetry from all services
# and forwards to the appropriate backends.

receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Add resource detection for better log labels
  resource:
    attributes:
      - key: loki.resource.labels
        value: service.name
        action: insert

exporters:
  # Traces → Grafana Tempo
  otlp/tempo:
    endpoint: "tempo:4317"
    tls:
      insecure: true

  # Metrics → Prometheus (via remote write)
  prometheusremotewrite:
    endpoint: "http://prometheus:9090/api/v1/write"

  # Logs → Grafana Loki (via OTLP)
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
    tls:
      insecure: true

  # Debug logging (disable in production)
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite, debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/loki, debug]
