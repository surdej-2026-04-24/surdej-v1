# SearXNG settings for Surdej
# Docs: https://docs.searxng.org/admin/settings/

use_default_settings: true

server:
  secret_key: "surdej-searxng-dev-key-change-in-prod"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false # Disable rate limiting for internal use

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "da"
  formats:
    - html
    - json # Enable JSON API

engines:
  # Prioritize these engines
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

ui:
  static_use_hash: true
