apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: surdej-ingress
  namespace: surdej
  labels:
    app.kubernetes.io/name: ingress
  annotations:
    # Cloudflare Tunnel or nginx-ingress
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # SSE support for AI chat streaming
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: surdej.example.com
      http:
        paths:
          # API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: surdej-api
                port:
                  number: 5001
          # Frontend (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: surdej-frontend
                port:
                  number: 80
  tls:
    - hosts:
        - surdej.example.com
      secretName: surdej-tls
