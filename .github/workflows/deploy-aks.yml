name: Deploy to AKS

on:
  workflow_run:
    workflows: ["Build Containers"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  AKS_CLUSTER: YOUR_AKS_CLUSTER      # Replace with your AKS cluster name
  AKS_RESOURCE_GROUP: YOUR_RESOURCE_GROUP  # Replace with your resource group
  NAMESPACE: surdej-v1

jobs:
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    # Only deploy if the build succeeded (or manual trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.image_tag || 'latest' }}" >> $GITHUB_OUTPUT
          else
            # Use the tag from the triggering workflow
            REF="${{ github.event.workflow_run.head_branch }}"
            if [[ "$REF" == v* ]]; then
              echo "tag=${REF}" >> $GITHUB_OUTPUT
            else
              echo "tag=latest" >> $GITHUB_OUTPUT
            fi
          fi
          echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RESOURCE_GROUP }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Create namespace (if needed)
        run: |
          kubectl apply -f k8s/namespace.yaml

      - name: Run database migration
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ steps.tag.outputs.sha }}"

          # Substitute variables in migration job manifest
          export API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${TAG}"
          export COMMIT_SHA="${SHA}"

          envsubst < k8s/db-migrate-job.yaml | kubectl apply -f -

          # Wait for migration to complete (timeout 5 min)
          echo "Waiting for migration job to complete..."
          kubectl wait --for=condition=complete \
            --timeout=300s \
            -n ${{ env.NAMESPACE }} \
            job/surdej-db-migrate-${SHA} || {
              echo "Migration job failed or timed out!"
              kubectl logs -n ${{ env.NAMESPACE }} -l job-type=db-migrate --tail=50
              exit 1
            }
          echo "✅ Database migration complete"

      - name: Deploy infrastructure (NATS, Cloudflare tunnel)
        run: |
          # Copy Cloudflare tunnel credentials from old namespace
          kubectl get secret cloudflare-tunnel-credentials -n api -o yaml 2>/dev/null \
            | sed 's/namespace: api/namespace: surdej-v1/' \
            | kubectl apply -f - || echo "CF credentials already exist or source not found"

          kubectl apply -f k8s/infrastructure.yaml
          echo "✅ Infrastructure deployed (NATS, Cloudflare Tunnel)"

          # Wait for NATS to be ready
          kubectl rollout status deployment/nats -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Deploy all services
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Set image variables
          export API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${TAG}"
          export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${TAG}"
          export PDF_EXTRACTOR_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker-pdf-extractor:${TAG}"
          export WORKER_PDF_REFINERY_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker-pdf-refinery:${TAG}"
          export WORKER_KNOWLEDGE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker-knowledge:${TAG}"
          export WORKER_DOCUMENT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker-document:${TAG}"

          # Apply deployment manifest
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          
          # Force restart API deployment to pick up latest image if tag is 'latest'
          if [ "$TAG" = "latest" ]; then
             kubectl rollout restart deployment/surdej-api -n ${{ env.NAMESPACE }}
          fi

          echo "✅ All deployments applied"

      - name: Wait for rollouts
        run: |
          NS="${{ env.NAMESPACE }}"
          echo "Waiting for API rollout..."
          kubectl rollout status deployment/surdej-api -n $NS --timeout=120s

          echo "Waiting for Frontend rollout..."
          kubectl rollout status deployment/surdej-frontend -n $NS --timeout=120s

          echo "Waiting for Worker rollouts..."
          kubectl rollout status deployment/surdej-worker-pdf-refinery -n $NS --timeout=120s || true
          kubectl rollout status deployment/surdej-worker-knowledge -n $NS --timeout=120s || true
          kubectl rollout status deployment/surdej-worker-document -n $NS --timeout=120s || true

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment complete!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          kubectl get pods -n $NS
