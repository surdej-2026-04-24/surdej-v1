name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build internal packages
        run: |
          pnpm --filter @surdej/core... build
          pnpm --filter @surdej/module-pdf-refinery-core-shared build
          pnpm --filter @surdej/module-member-nosql-shared build

      - name: Prisma Generate
        run: pnpm --filter @surdej/frontend exec prisma generate 2>/dev/null || true

      - name: Build Frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_AUTH_PROVIDER: ${{ vars.VITE_AUTH_PROVIDER }}
        run: pnpm --filter @surdej/frontend build

      - name: SPA routing fallback
        run: cp apps/frontend/dist/index.html apps/frontend/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Purge Cloudflare cache
        if: vars.CLOUDFLARE_ZONE_ID != ''
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ vars.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
