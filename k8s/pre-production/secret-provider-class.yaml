apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: surdej-v1-keyvault
  namespace: surdej-v1
  labels:
    app.kubernetes.io/name: surdej-v1
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""
    keyvaultName: "YOUR_KEY_VAULT"
    tenantId: "31f35f1f-b9e8-432b-b233-d3ed528749c4"
    objects: |
      array:
        - |
          objectName: surdej-v1-DATABASE-URL
          objectType: secret
          objectAlias: DATABASE_URL
        - |
          objectName: surdej-v1-POSTGRES-USER
          objectType: secret
          objectAlias: POSTGRES_USER
        - |
          objectName: surdej-v1-POSTGRES-PASSWORD
          objectType: secret
          objectAlias: POSTGRES_PASSWORD
        - |
          objectName: surdej-v1-NATS-URL
          objectType: secret
          objectAlias: NATS_URL
        - |
          objectName: surdej-v1-AZURE-TENANT-ID
          objectType: secret
          objectAlias: AZURE_TENANT_ID
        - |
          objectName: surdej-v1-AZURE-CLIENT-ID
          objectType: secret
          objectAlias: AZURE_CLIENT_ID
        - |
          objectName: surdej-v1-AZURE-CLIENT-SECRET
          objectType: secret
          objectAlias: AZURE_CLIENT_SECRET
        - |
          objectName: surdej-v1-AZURE-STORAGE-CONNECTION-STRING
          objectType: secret
          objectAlias: AZURE_STORAGE_CONNECTION_STRING
        - |
          objectName: surdej-v1-AZURE-OPENAI-API-KEY
          objectType: secret
          objectAlias: AZURE_OPENAI_API_KEY
        - |
          objectName: surdej-v1-AZURE-OPENAI-ENDPOINT
          objectType: secret
          objectAlias: AZURE_OPENAI_ENDPOINT
  secretObjects:
    - secretName: surdej-api-secrets
      type: Opaque
      data:
        - objectName: DATABASE_URL
          key: DATABASE_URL
        - objectName: POSTGRES_USER
          key: POSTGRES_USER
        - objectName: POSTGRES_PASSWORD
          key: POSTGRES_PASSWORD
        - objectName: NATS_URL
          key: NATS_URL
        - objectName: AZURE_TENANT_ID
          key: AZURE_TENANT_ID
        - objectName: AZURE_CLIENT_ID
          key: AZURE_CLIENT_ID
        - objectName: AZURE_CLIENT_SECRET
          key: AZURE_CLIENT_SECRET
        - objectName: AZURE_STORAGE_CONNECTION_STRING
          key: AZURE_STORAGE_CONNECTION_STRING
        - objectName: AZURE_OPENAI_API_KEY
          key: AZURE_OPENAI_API_KEY
        - objectName: AZURE_OPENAI_ENDPOINT
          key: AZURE_OPENAI_ENDPOINT
