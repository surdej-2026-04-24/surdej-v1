# ─────────────────────────────────────────────────────────────────
# Surdej API & Workers Configuration
# ─────────────────────────────────────────────────────────────────
# This ConfigMap provides non-sensitive environment variables
# to the API and worker pods. Sensitive values go into Key Vault.
#
apiVersion: v1
kind: ConfigMap
metadata:
  name: surdej-api-config
  namespace: surdej-v1
data:
  # AI Configuration
  AZURE_OPENAI_API_VERSION: "2024-12-01-preview"

  # App Configuration
  NODE_ENV: "production"
  LOG_LEVEL: "info"
