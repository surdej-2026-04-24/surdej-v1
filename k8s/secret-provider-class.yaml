apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ${APP_NAME}-keyvault
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: ${APP_NAME}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""
    keyvaultName: "${KEY_VAULT}"
    tenantId: "${TENANT_ID}"
    objects: |
      array:
        - |
          objectName: ${ORG_REPO_PREFIX}-DATABASE-URL
          objectType: secret
          objectAlias: DATABASE_URL
        - |
          objectName: ${ORG_REPO_PREFIX}-POSTGRES-USER
          objectType: secret
          objectAlias: POSTGRES_USER
        - |
          objectName: ${ORG_REPO_PREFIX}-POSTGRES-PASSWORD
          objectType: secret
          objectAlias: POSTGRES_PASSWORD
  secretObjects:
    - secretName: ${APP_NAME}-api-secrets
      type: Opaque
      data:
        - objectName: DATABASE_URL
          key: DATABASE_URL
        - objectName: POSTGRES_USER
          key: POSTGRES_USER
        - objectName: POSTGRES_PASSWORD
          key: POSTGRES_PASSWORD
