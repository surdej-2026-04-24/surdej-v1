# ─────────────────────────────────────────────────────────────────
# NATS JetStream
# ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: surdej-v1
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          args:
            - "--jetstream"
            - "--store_dir=/data/jetstream"
            - "--http_port=8222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: jetstream-data
              mountPath: /data/jetstream
      volumes:
        - name: jetstream-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats-service
  namespace: surdej-v1
spec:
  selector:
    app: nats
  ports:
    - name: client
      protocol: TCP
      port: 4222
      targetPort: 4222
    - name: monitoring
      protocol: TCP
      port: 8222
      targetPort: 8222
  type: ClusterIP
---
# ─────────────────────────────────────────────────────────────────
# Cloudflare Tunnel
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflare-tunnel-config
  namespace: surdej-v1
data:
  config.yaml: |
    tunnel: 22900e0b-8a84-4d2b-a6c8-3ba5b9cc5c5f
    credentials-file: /etc/cloudflared/credentials.json
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      - hostname: api.YOUR_DOMAIN
        service: http://surdej-api-service.surdej-v1.svc.cluster.local:5001
      - hostname: app.YOUR_DOMAIN
        service: http://surdej-frontend-service.surdej-v1.svc.cluster.local:80
      - service: http_status:404
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-tunnel
  namespace: surdej-v1
  labels:
    app: cloudflare-tunnel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-tunnel
  template:
    metadata:
      labels:
        app: cloudflare-tunnel
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - "tunnel"
            - "--config"
            - "/etc/cloudflared/config.yaml"
            - "run"
          volumeMounts:
            - name: config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: cloudflare-tunnel-config
        - name: credentials
          secret:
            secretName: cloudflare-tunnel-credentials
---
# ─────────────────────────────────────────────────────────────────
# SearXNG — Self-hosted metasearch engine for AI web search
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: surdej-v1
data:
  settings.yml: |
    use_default_settings: true
    server:
      secret_key: "surdej-searxng-prod-2026"
      bind_address: "0.0.0.0"
      port: 8080
      limiter: false
    search:
      safe_search: 0
      autocomplete: ""
      default_lang: "da"
      formats:
        - html
        - json
    engines:
      - name: google
        engine: google
        shortcut: g
        disabled: false
      - name: bing
        engine: bing
        shortcut: b
        disabled: false
      - name: duckduckgo
        engine: duckduckgo
        shortcut: ddg
        disabled: false
      - name: wikipedia
        engine: wikipedia
        shortcut: wp
        disabled: false
    ui:
      static_use_hash: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: surdej-v1
  labels:
    app: searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
        - name: searxng
          image: searxng/searxng:latest
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: settings
          configMap:
            name: searxng-settings
---
apiVersion: v1
kind: Service
metadata:
  name: searxng-service
  namespace: surdej-v1
spec:
  selector:
    app: searxng
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
