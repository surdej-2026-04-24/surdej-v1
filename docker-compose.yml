# ─────────────────────────────────────────────────────────────────
# Surdej v1 — Docker Compose
#
# Network architecture:
#   surdej-internal   — All services communicate internally.
#                       Only the API port is exposed to the host.
#
# Multi-instance:
#   Set COMPOSE_PROJECT_NAME to run multiple copies side-by-side:
#     COMPOSE_PROJECT_NAME=surdej-core      docker compose up -d
#
#   To let instances share infra (postgres, nats, redis), switch to
#   an external network:
#     docker network create surdej-shared
#   then set "external: true" on surdej-internal below.
#
#   Per-instance overrides live in docker-compose.<instance>.yml
# ─────────────────────────────────────────────────────────────────

name: surdej-2026-04-24

networks:
  surdej-internal:
    driver: bridge
    # To share across compose projects, uncomment:
    # external: true
    # name: surdej-shared

services:
  # ─── Infrastructure (internal only) ────────────────────────────
  #
  # These services have NO published ports — they are only reachable
  # via the surdej-internal network. Workers and the API connect by
  # service name (e.g. postgres:5432, nats:4222, redis:6379).
  #
  # For local tooling (psql, NATS CLI, redis-cli) uncomment the
  # "ports" sections below, or use `docker compose exec`.

  postgres:
    image: pgvector/pgvector:pg16
    networks: [surdej-internal]
    environment:
      POSTGRES_USER: surdej
      POSTGRES_PASSWORD: surdej_dev
      POSTGRES_DB: surdej
    # Internal only — use `docker compose exec postgres psql` for local access.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surdej"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    networks: [surdej-internal]
    command: >
      --jetstream --store_dir /data --http_port 8222
    # No published ports — internal only.
    # Uncomment for local NATS CLI debugging:
    # ports:
    #   - "127.0.0.1:4222:4222"
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks: [surdej-internal]
    command: redis-server --appendonly yes
    # No published ports — internal only.
    # Uncomment for local redis-cli:
    # ports:
    #   - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SearXNG (self-hosted web search) ───────────────────────────

  searxng:
    image: searxng/searxng:latest
    networks: [surdej-internal]
    volumes:
      - ./infra/searxng/settings.yml:/etc/searxng/settings.yml:ro
    # Internal only — the API calls it via http://searxng:8080
    # Uncomment to browse the UI locally:
    # ports:
    #   - "127.0.0.1:8888:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── API Server (the only externally exposed service) ──────────

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    networks: [surdej-internal]
    ports:
      - "5001:5001"
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      # Mount only source directories — preserve container's node_modules
      - ./modules/member-feedback/shared/src:/app/modules/member-feedback/shared/src:ro
      - ./modules/member-runbook/shared/src:/app/modules/member-runbook/shared/src:ro
      - ./modules/mental-klarhed/shared/src:/app/modules/mental-klarhed/shared/src:ro
    environment:
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      PORT: "5001"
      HOST: "0.0.0.0"
      NODE_ENV: development
      AUTH_PROVIDER: demo
      NATS_URL: nats://nats:4222
      CORS_ORIGIN: http://localhost:4001
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: surdej-api
      # Azure OpenAI (read from root .env)
      AI_PROVIDER: ${AI_PROVIDER:-azure}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      AZURE_OPENAI_MODEL_LOW: ${AZURE_OPENAI_MODEL_LOW:-gpt-4o}
      AZURE_OPENAI_MODEL_MEDIUM: ${AZURE_OPENAI_MODEL_MEDIUM:-gpt-5.2-chat}
      AZURE_OPENAI_MODEL_HIGH: ${AZURE_OPENAI_MODEL_HIGH:-gpt-5.4-pro}
      AZURE_OPENAI_MODEL_REASONING: ${AZURE_OPENAI_MODEL_REASONING:-o3}
      SEARXNG_URL: http://searxng:8080
      # Keyvault encryption
      KEYVAULT_MASTER_KEY: ${KEYVAULT_MASTER_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── Module Workers ─────────────────────────────────────────────

  mental-klarhed-worker:
    build:
      context: .
      dockerfile: modules/mental-klarhed/worker/Dockerfile.dev
    networks: [surdej-internal]
    volumes:
      - ./modules/mental-klarhed/shared/src:/app/modules/mental-klarhed/shared/src
      - ./modules/mental-klarhed/worker/src:/app/modules/mental-klarhed/worker/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      MODULE_PORT: "7010"
      MODULE_BASE_URL: http://mental-klarhed-worker:7010
      JWT_SECRET: ${MENTAL_KLARHED_JWT_SECRET:-change-me-in-production}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:5173}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Asger Steenholdt <asger@asgersteenholdt.com>}
      NODE_ENV: development
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  member-nosql-worker:
    build:
      context: .
      dockerfile: modules/member-nosql/worker/Dockerfile.dev
    networks: [surdej-internal]
    volumes:
      - ./modules/member-nosql/shared/src:/app/modules/member-nosql/shared/src
      - ./modules/member-nosql/worker/src:/app/modules/member-nosql/worker/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      MODULE_PORT: "7006"
      MODULE_BASE_URL: http://member-nosql-worker:7006
      NODE_ENV: development
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  tool-management-tools-worker:
    build:
      context: .
      dockerfile: modules/tool-management-tools/worker/Dockerfile.dev
    networks: [surdej-internal]
    volumes:
      - ./modules/tool-management-tools/shared/src:/app/modules/tool-management-tools/shared/src
      - ./modules/tool-management-tools/worker/src:/app/modules/tool-management-tools/worker/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      MODULE_PORT: "7005"
      MODULE_BASE_URL: http://tool-management-tools-worker:7005
      NODE_ENV: development
      AI_PROVIDER: ${AI_PROVIDER:-azure}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      AZURE_OPENAI_MODEL_MEDIUM: ${AZURE_OPENAI_MODEL_MEDIUM:-gpt-5.2-chat}
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  core-issues-worker:
    build:
      context: .
      dockerfile: modules/core-issues/worker/Dockerfile.dev
    networks: [surdej-internal]
    volumes:
      - ./modules/core-issues/shared/src:/app/modules/core-issues/shared/src
      - ./modules/core-issues/worker/src:/app/modules/core-issues/worker/src
    environment:
      NATS_URL: nats://nats:4222
      MODULE_PORT: "7004"
      MODULE_BASE_URL: http://core-issues-worker:7004
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      NODE_ENV: development
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  member-feedback-worker:
    build:
      context: .
      dockerfile: modules/member-feedback/worker/Dockerfile.dev
    networks: [surdej-internal]
    volumes:
      - ./modules/member-feedback/shared/src:/app/modules/member-feedback/shared/src
      - ./modules/member-feedback/worker/src:/app/modules/member-feedback/worker/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      MODULE_PORT: "7003"
      MODULE_BASE_URL: http://member-feedback-worker:7003
      NODE_ENV: development
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  core-comms-worker:
    build:
      context: .
      dockerfile: modules/core-comms/worker/Dockerfile.dev
    networks: [surdej-internal]
    volumes:
      - ./modules/core-comms/shared/src:/app/modules/core-comms/shared/src
      - ./modules/core-comms/worker/src:/app/modules/core-comms/worker/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      MODULE_PORT: "7007"
      MODULE_BASE_URL: http://core-comms-worker:7007
      NODE_ENV: development
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      SMSGATE_BASE_URL: ${SMSGATE_BASE_URL:-}
      SMSGATE_USERNAME: ${SMSGATE_USERNAME:-}
      SMSGATE_PASSWORD: ${SMSGATE_PASSWORD:-}
      SMSGATE_DEVICE_ID: ${SMSGATE_DEVICE_ID:-}
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  core-comms-webhook-receiver:
    build:
      context: .
      dockerfile: modules/core-comms/webhook-receiver/Dockerfile.dev
    networks: [surdej-internal]
    ports:
      - "7008:7008"  # Exposed for Cloudflare tunnel
    volumes:
      - ./modules/core-comms/shared/src:/app/modules/core-comms/shared/src
      - ./modules/core-comms/webhook-receiver/src:/app/modules/core-comms/webhook-receiver/src
    environment:
      NATS_URL: nats://nats:4222
      MODULE_PORT: "7008"
      NODE_ENV: development
    depends_on:
      nats:
        condition: service_healthy

  # ─── Workers (optional profile) ────────────────────────────────
  #
  # All workers run on the internal network.
  # Enable with:  docker compose --profile workers up -d

  knowledge-worker:
    build:
      context: .
      dockerfile: workers/knowledge/Dockerfile
    networks: [surdej-internal]
    profiles: ["workers"]
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./workers/_template/src:/app/workers/_template/src
      - ./workers/knowledge/src:/app/workers/knowledge/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: knowledge-worker
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  document-worker:
    build:
      context: .
      dockerfile: workers/document/Dockerfile
    networks: [surdej-internal]
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./workers/_template/src:/app/workers/_template/src
      - ./workers/document/src:/app/workers/document/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: surdej
      MINIO_ROOT_PASSWORD: surdej_dev
      STORAGE_BUCKET: ${STORAGE_BUCKET:-storage}
      DOCUMENT_EXTRACTOR_URL: http://document-extractor:8091
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: document-worker
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      document-extractor:
        condition: service_healthy

  # ─── Document Extractor (Python, docx/xlsx/pptx) ─────────────
  #
  # Office document → Markdown conversion using python-docx, openpyxl, python-pptx.
  # The Node.js document-worker calls this via HTTP.

  document-extractor:
    build:
      context: .
      dockerfile: workers/document/extractor/Dockerfile
    networks: [surdej-internal]
    environment:
      EXTRACTOR_PORT: "8091"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8091/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── PDF Extractor (Python, pymupdf4llm) ─────────────────────
  #
  # Best-in-class PDF → Markdown conversion using pymupdf4llm.
  # The Node.js pdf-refinery-worker calls this via HTTP.

  pdf-extractor:
    build:
      context: .
      dockerfile: workers/pdf-refinery/extractor/Dockerfile
    networks: [surdej-internal]
    environment:
      EXTRACTOR_PORT: "8090"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G

  pdf-refinery-worker:
    build:
      context: .
      dockerfile: workers/pdf-refinery/Dockerfile
    networks: [surdej-internal]
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./workers/_template/src:/app/workers/_template/src
      - ./workers/pdf-refinery/src:/app/workers/pdf-refinery/src
      - ./workers/pdf-refinery/embed.py:/app/workers/pdf-refinery/embed.py
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: surdej
      MINIO_ROOT_PASSWORD: surdej_dev
      STORAGE_BUCKET: ${STORAGE_BUCKET:-storage}
      API_URL: http://api:5001
      PDF_EXTRACTOR_URL: http://pdf-extractor:8090
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      AZURE_OPENAI_MODEL_MEDIUM: ${AZURE_OPENAI_MODEL_MEDIUM:-gpt-5.2-chat}
      AZURE_OPENAI_MODEL_HIGH: ${AZURE_OPENAI_MODEL_HIGH:-gpt-5.4-pro}
      # Mistral AI (Azure AI Foundry)
      MISTRAL_ENDPOINT: ${MISTRAL_ENDPOINT:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_DOCUMENT_MODEL: ${MISTRAL_DOCUMENT_MODEL:-mistral-document-ai-2512}
      NODE_OPTIONS: "--max-old-space-size=6144 --expose-gc"
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: pdf-refinery-worker
    deploy:
      resources:
        limits:
          memory: 8G
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      pdf-extractor:
        condition: service_healthy

  laka-dispatch-worker:
    build:
      context: .
      dockerfile: workers/laka-dispatch/Dockerfile
    networks: [surdej-internal]
    profiles: ["workers"]
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./workers/_template/src:/app/workers/_template/src
      - ./workers/laka-dispatch/src:/app/workers/laka-dispatch/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: laka-dispatch-worker
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy

  sharepoint-ingest-worker:
    build:
      context: .
      dockerfile: workers/sharepoint-ingest/Dockerfile
    networks: [surdej-internal]
    profiles: ["workers"]
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./workers/_template/src:/app/workers/_template/src
      - ./workers/sharepoint-ingest/src:/app/workers/sharepoint-ingest/src
    environment:
      NATS_URL: nats://nats:4222
      DATABASE_URL: postgresql://surdej:surdej_dev@postgres:5432/surdej?schema=public
      NODE_ENV: development
      # SharePoint credentials (from .env or docker-compose override)
      SP_TENANT_ID: ${SP_TENANT_ID:-}
      SP_CLIENT_ID: ${SP_CLIENT_ID:-}
      SP_CLIENT_SECRET: ${SP_CLIENT_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: sharepoint-ingest-worker
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
  analyze-worker:
    build:
      context: .
      dockerfile: workers/analyze/Dockerfile
    networks: [surdej-internal]
    profiles: ["workers"]
    volumes:
      - ./packages/core/src:/app/packages/core/src
      - ./workers/_template/src:/app/workers/_template/src
      - ./workers/analyze/src:/app/workers/analyze/src
    environment:
      NATS_URL: nats://nats:4222
      NODE_ENV: development
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: analyze-worker
    depends_on:
      nats:
        condition: service_healthy
    # Note: No Postgres dependency — this worker is fully ephemeral via NATS

    # ─── Monitoring ───────────────────────────────────────────────
    #
    # Starts with core containers by default.
    # Prometheus: http://127.0.0.1:9090
    # Grafana:    http://127.0.0.1:3000  (admin / surdej_dev)

  prometheus:
    image: prom/prometheus:v2.53.0
    networks: [surdej-internal]
    # ports:
    #   - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.0
    networks: [surdej-internal]
    # ports:
    #   - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: surdej_dev
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafanadata:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
      - loki

  loki:
    image: grafana/loki:3.1.0
    networks: [surdej-internal]
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./infra/monitoring/loki.yaml:/etc/loki/loki.yaml:ro
      - lokidata:/loki

  tempo:
    image: grafana/tempo:2.6.1
    networks: [surdej-internal]
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/monitoring/tempo.yaml:/etc/tempo.yaml:ro
      - tempodata:/var/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.113.0
    networks: [surdej-internal]
    command: ["--config=/etc/otelcol.yaml"]
    volumes:
      - ./infra/monitoring/otelcol.yaml:/etc/otelcol.yaml:ro
    depends_on:
      - tempo
      - prometheus
      - loki

  # ─── Blob Storage (MinIO) ──────────────────────────────────────

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    networks: [surdej-internal]
    # ports:
    #   - "127.0.0.1:9000:9000"
    #   - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: surdej
      MINIO_ROOT_PASSWORD: surdej_dev
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  createbuckets:
    image: minio/mc
    networks: [surdej-internal]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 surdej surdej_dev; /usr/bin/mc mb myminio/storage; /usr/bin/mc anonymous set public myminio/storage; exit 0; "

volumes:
  pgdata:
  natsdata:
  redisdata:
  promdata:
  grafanadata:
  lokidata:
  tempodata:
  miniodata:
